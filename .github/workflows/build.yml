name: Build and Deploy

on:
  push:
    branches: ["master"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      exists: ${{ steps.version.outputs.exists }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version
        id: version
        run: |
          VERSION=$(grep '^plugin_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          if git tag -l "v$VERSION" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        if: steps.version.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.version.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        if: steps.version.outputs.exists == 'false'
        run: chmod +x gradlew

      - name: Build
        if: steps.version.outputs.exists == 'false'
        run: ./gradlew shadowJar

      - name: Release
        if: steps.version.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.value }}"
          files: target/*.jar

  deploy:
    needs: build-and-release
    if: needs.build-and-release.outputs.exists == 'false'
    uses: AlcarisMinecraftServer/.github/.github/workflows/deploy.yml@main
    with:
      jar_name: "TextureUpdater-*.jar"
      plugin_name: "TextureUpdater"
      server_ids: "d7655a1d"
    secrets:
      PUFFERPANEL_URL: ${{ secrets.PUFFERPANEL_URL }}
      PUFFERPANEL_CLIENT_ID: ${{ secrets.PUFFERPANEL_CLIENT_ID }}
      PUFFERPANEL_CLIENT_SECRET: ${{ secrets.PUFFERPANEL_CLIENT_SECRET }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
